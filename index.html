<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вики — товары</title>
    <style>
        /* Стили — всё, как вы настроили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Главный экран (категории) с фоновой картинкой на весь экран */
        #categoriesScreen {
            background-image: url('https://sun9-27.userapi.com/s/v1/ig2/DCPWFdfpl0ZK8takuXG4553WRuCYj5KVrwXU1C4huPxurLouFLJe2wDA3AKsRzQ9ZgSvUPGgwUjm0FH-cI9DWaQ6.jpg?quality=95&as=32x18,48x27,72x40,108x61,160x90,240x135,360x202,480x270,540x304,640x360,720x405,1080x607,1280x720,1440x810,2560x1440&from=bu&cs=2560x0');   /* ЗАМЕНИТЕ НА ВАШУ ССЫЛКУ */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 40px;
        }

        /* Экран списка товаров и детальный экран без фоновой картинки (светлый фон) */
        #itemsScreen, #detailScreen {
            background: #f2f2f2;
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 40px;
        }

        .screen {
            display: block;
        }

        .screen.hidden {
            display: none;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 12px;
        }

        .category-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .category-card:active {
            transform: scale(0.97);
        }

        .category-card .cover-bg {
            width: 100%;
            height: 140px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .category-card h3 {
            padding: 12px 8px;
            font-size: 16px;
            text-align: center;
            font-weight: 500;
            background: rgba(255,255,255,0.9);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .item-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        .item-card:active {
            transform: scale(0.97);
        }

        .item-card .cover-bg {
            width: 100%;
            height: 160px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .item-card .info {
            padding: 10px;
        }

        .item-card .title {
            font-weight: 600;
            font-size: 15px;
        }

        .detail-container {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            margin-top: 12px;
        }

        .detail-img {
            width: 100%;
            max-height: 320px;
            object-fit: cover;
        }

        .detail-content {
            padding: 20px;
        }

        .detail-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .detail-desc {
            font-size: 16px;
            line-height: 1.45;
            color: #2c2c2e;
            margin-bottom: 24px;
        }

        .back-button {
            background: #e1e1e1;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .back-button:active {
            opacity: 0.7;
        }

        h2 {
            font-size: 22px;
            margin: 8px 0 4px 0;
        }

        .sub {
            color: #6c6c70;
            margin-bottom: 12px;
        }
    </style>
    <script src="https://vk.com/js/api/xd_connection.js?2" type="text/javascript"></script>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>

<div id="categoriesScreen" class="screen">
    <h2>RMRP wiki</h2>
    <div id="categoriesContainer" class="categories-grid"></div>
</div>

<div id="itemsScreen" class="screen hidden">
    <button class="back-button" id="backToCategoriesBtn">← Назад</button>
    <h2 id="categoryTitle">Категория</h2>
    <div id="itemsContainer" class="items-grid"></div>
</div>

<div id="detailScreen" class="screen hidden">
    <button class="back-button" id="backToItemsBtn">← Назад к списку</button>
    <div id="detailContent"></div>
</div>

<script>
    // ---------- ДАННЫЕ (категории и товары) ----------
    const categories = [
        { id: "tech", name: "📱 Автомобили", cover: "https://placekitten.com/400/200", desc: "..." },
        { id: "home", name: "🏠 Мотоциклы", cover: "https://placekitten.com/401/200", desc: "..." },
        { id: "style", name: "👕 Лодки", cover: "https://placekitten.com/402/200", desc: "..." },
        { id: "style", name: "👕 Вертолёты", cover: "https://placekitten.com/402/200", desc: "..." }
    ];

    const items = {
        tech: [ /* ... ваши товары ... */ ],
        home: [ /* ... */ ],
        style: [ /* ... */ ]
    };

    // ---------- ПЕРЕМЕННЫЕ СОСТОЯНИЯ ----------
    let currentScreen = 'categories'; // 'categories', 'items', 'detail'
    let currentCategoryId = '';
    let currentCategoryName = '';
    let currentItemId = '';

    // ---------- ФУНКЦИЯ ОБНОВЛЕНИЯ ИНТЕРФЕЙСА ----------
    function updateUI() {
        // Прячем все экраны
        document.getElementById('categoriesScreen').classList.add('hidden');
        document.getElementById('itemsScreen').classList.add('hidden');
        document.getElementById('detailScreen').classList.add('hidden');

        if (currentScreen === 'categories') {
            document.getElementById('categoriesScreen').classList.remove('hidden');
            // Настройка свайпа: разрешаем закрытие приложения
            if (window.vkBridge) {
                window.vkBridge.send('VKWebAppSetSwipeSettings', { history: true }).catch(e => console.error(e));
            }
        } 
        else if (currentScreen === 'items') {
            // Отрисовываем список товаров для текущей категории
            document.getElementById('categoryTitle').innerText = currentCategoryName;
            const itemsList = items[currentCategoryId] || [];
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';
            if (itemsList.length === 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;">Товаров пока нет</div>';
            } else {
                itemsList.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.onclick = () => {
                        // Переход на детальный экран
                        currentScreen = 'detail';
                        currentItemId = item.id;
                        // Добавляем запись в историю
                        history.pushState({ screen: 'detail', categoryId: currentCategoryId, itemId: item.id }, '');
                        updateUI();
                    };
                    card.innerHTML = `
                        <div class="cover-bg" style="background-image: url('${item.img}');"></div>
                        <div class="info"><div class="title">${item.name}</div></div>
                    `;
                    container.appendChild(card);
                });
            }
            document.getElementById('itemsScreen').classList.remove('hidden');
            // Запрещаем закрытие свайпом, используем для навигации
            if (window.vkBridge) {
                window.vkBridge.send('VKWebAppSetSwipeSettings', { history: false }).catch(e => console.error(e));
            }
        }
        else if (currentScreen === 'detail') {
            // Отрисовываем детальный экран
            const foundItem = items[currentCategoryId]?.find(i => i.id === currentItemId);
            if (foundItem) {
                const detailDiv = document.getElementById('detailContent');
                detailDiv.innerHTML = `
                    <div class="detail-container">
                        <img class="detail-img" src="${foundItem.img}" alt="${foundItem.name}">
                        <div class="detail-content">
                            <div class="detail-title">${foundItem.name}</div>
                            <div class="detail-desc">${foundItem.description}</div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('detailScreen').classList.remove('hidden');
            // Запрещаем закрытие свайпом
            if (window.vkBridge) {
                window.vkBridge.send('VKWebAppSetSwipeSettings', { history: false }).catch(e => console.error(e));
            }
        }
    }

    // ---------- НАВИГАЦИЯ ПО КНОПКАМ "НАЗАД" ----------
    function goBack() {
        if (currentScreen === 'detail') {
            // Возврат к списку товаров
            currentScreen = 'items';
            // Заменяем текущее состояние в истории, чтобы не плодить лишние записи
            history.replaceState({ screen: 'items', categoryId: currentCategoryId, categoryName: currentCategoryName }, '');
            updateUI();
        } 
        else if (currentScreen === 'items') {
            // Возврат на главный экран
            currentScreen = 'categories';
            history.replaceState({ screen: 'categories' }, '');
            updateUI();
        }
        // На главном экране кнопки "назад" нет, но если вызовут — ничего не делаем
    }

    // ---------- ОБРАБОТЧИК СВАЙПА/СИСТЕМНОЙ КНОПКИ НАЗАД ----------
    window.addEventListener('popstate', (event) => {
        if (event.state) {
            // Восстанавливаем состояние из истории
            const state = event.state;
            if (state.screen === 'categories') {
                currentScreen = 'categories';
                updateUI();
            } 
            else if (state.screen === 'items') {
                currentScreen = 'items';
                currentCategoryId = state.categoryId;
                currentCategoryName = state.categoryName;
                updateUI();
            }
            else if (state.screen === 'detail') {
                currentScreen = 'detail';
                currentCategoryId = state.categoryId;
                currentItemId = state.itemId;
                updateUI();
            }
        } else {
            // Если нет состояния, уходим на главный экран
            currentScreen = 'categories';
            updateUI();
        }
    });

    // ---------- ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ ----------
    function init() {
        // Рендерим категории (главный экран)
        const container = document.getElementById('categoriesContainer');
        container.innerHTML = '';
        categories.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'category-card';
            card.onclick = () => {
                // Переход в категорию
                currentScreen = 'items';
                currentCategoryId = cat.id;
                currentCategoryName = cat.name;
                // Добавляем состояние в историю
                history.pushState({ screen: 'items', categoryId: cat.id, categoryName: cat.name }, '');
                updateUI();
            };
            card.innerHTML = `
                <div class="cover-bg" style="background-image: url('${cat.cover}');"></div>
                <h3>${cat.name}</h3>
            `;
            container.appendChild(card);
        });

        // Настройка кнопок "Назад"
        document.getElementById('backToCategoriesBtn').onclick = goBack;
        document.getElementById('backToItemsBtn').onclick = goBack;

        // Начальное состояние
        currentScreen = 'categories';
        history.replaceState({ screen: 'categories' }, '');
        updateUI();

        // Инициализация VK Bridge
        if (window.vkBridge) {
            window.vkBridge.send('VKWebAppInit')
                .then(() => console.log('VK Bridge инициализирован'))
                .catch(e => console.error(e));
        }
    }

    init();
</script>
</body>
</html>
