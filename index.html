<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вики — товары</title>
    <style>
        /* Стили — всё, как вы настроили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Главный экран (категории) с фоновой картинкой на весь экран */
        #categoriesScreen {
            background-image: url('https://sun9-27.userapi.com/s/v1/ig2/DCPWFdfpl0ZK8takuXG4553WRuCYj5KVrwXU1C4huPxurLouFLJe2wDA3AKsRzQ9ZgSvUPGgwUjm0FH-cI9DWaQ6.jpg?quality=95&as=32x18,48x27,72x40,108x61,160x90,240x135,360x202,480x270,540x304,640x360,720x405,1080x607,1280x720,1440x810,2560x1440&from=bu&cs=2560x0');   /* ЗАМЕНИТЕ НА ВАШУ ССЫЛКУ */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 40px;
        }

        /* Экран списка товаров и детальный экран без фоновой картинки (светлый фон) */
        #itemsScreen, #detailScreen {
            background: #f2f2f2;
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 40px;
        }

        .screen {
            display: block;
        }

        .screen.hidden {
            display: none;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 12px;
        }

        .category-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .category-card:active {
            transform: scale(0.97);
        }

        .category-card .cover-bg {
            width: 100%;
            height: 140px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .category-card h3 {
            padding: 12px 8px;
            font-size: 16px;
            text-align: center;
            font-weight: 500;
            background: rgba(255,255,255,0.9);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .item-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        .item-card:active {
            transform: scale(0.97);
        }

        .item-card .cover-bg {
            width: 100%;
            height: 160px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .item-card .info {
            padding: 10px;
        }

        .item-card .title {
            font-weight: 600;
            font-size: 15px;
        }

        .detail-container {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            margin-top: 12px;
        }

        .detail-img {
            width: 100%;
            max-height: 320px;
            object-fit: cover;
        }

        .detail-content {
            padding: 20px;
        }

        .detail-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .detail-desc {
            font-size: 16px;
            line-height: 1.45;
            color: #2c2c2e;
            margin-bottom: 24px;
        }

        .back-button {
            background: #e1e1e1;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .back-button:active {
            opacity: 0.7;
        }

        h2 {
            font-size: 22px;
            margin: 8px 0 4px 0;
        }

        .sub {
            color: #6c6c70;
            margin-bottom: 12px;
        }
    </style>
    <script src="https://vk.com/js/api/xd_connection.js?2" type="text/javascript"></script>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>

<div id="categoriesScreen" class="screen">
    <h2>📚 Каталог вики</h2>
    <div class="sub">Выбери раздел</div>
    <div id="categoriesContainer" class="categories-grid"></div>
</div>

<div id="itemsScreen" class="screen hidden">
    <button class="back-button" id="backToCategoriesBtn">← Назад</button>
    <h2 id="categoryTitle">Категория</h2>
    <div id="itemsContainer" class="items-grid"></div>
</div>

<div id="detailScreen" class="screen hidden">
    <button class="back-button" id="backToItemsBtn">← Назад к списку</button>
    <div id="detailContent"></div>
</div>

<script>
    // ---------- 1. ДАННЫЕ (ваша база) ----------
    const categories = [
        { id: "tech", name: "📱 Гаджеты", cover: "https://placekitten.com/400/200", desc: "Смартфоны, часы, наушники" },
        { id: "home", name: "🏠 Дом", cover: "https://placekitten.com/401/200", desc: "Уют и техника для дома" },
        { id: "style", name: "👕 Стиль", cover: "https://placekitten.com/402/200", desc: "Одежда и аксессуары" }
    ];

    const items = {
        tech: [
            { id: "phone", name: "Смартфон X", img: "https://placekitten.com/300/300", description: "Мощный процессор, 128 ГБ памяти, отличная камера. Цвет: космический черный." },
            { id: "watch", name: "Умные часы", img: "https://placekitten.com/301/300", description: "Отслеживание сна, шагов, уведомления с телефона. Водонепроницаемые." },
            { id: "pods", name: "Наушники Pro", img: "https://placekitten.com/302/300", description: "Активное шумоподавление, 24 часа работы, чистый звук." }
        ],
        home: [
            { id: "lamp", name: "Умная лампа", img: "https://placekitten.com/303/300", description: "RGB подсветка, управление с телефона, таймер сна." },
            { id: "robot", name: "Робот-пылесос", img: "https://placekitten.com/304/300", description: "Строит карту комнаты, убирает шерсть, работает 2 часа." },
            { id: "kettle", name: "Электрочайник", img: "https://placekitten.com/305/300", description: "Терморегуляция, поддержание температуры, 1.7 литра." }
        ],
        style: [
            { id: "backpack", name: "Рюкзак", img: "https://placekitten.com/306/300", description: "Водоотталкивающая ткань, отдел для ноутбука 15 дюймов." },
            { id: "cap", name: "Бейсболка", img: "https://placekitten.com/307/300", description: "Хлопок, регулировка, 3 цвета в ассортименте." },
            { id: "watch_strap", name: "Ремешок для часов", img: "https://placekitten.com/308/300", description: "Кожаный, подходит для большинства смарт-часов." }
        ]
    };

    // ---------- 2. ФУНКЦИИ НАВИГАЦИИ ----------
    let currentCategoryId = "";
    let lastCategoryId = "";

    function showScreen(screenId) {
        // Прячем все экраны и показываем нужный
        document.getElementById("categoriesScreen").classList.add("hidden");
        document.getElementById("itemsScreen").classList.add("hidden");
        document.getElementById("detailScreen").classList.add("hidden");
        document.getElementById(screenId).classList.remove("hidden");

        // ВАЖНО: Отправляем событие в VK о настройках свайпа
        if (window.vkBridge) {
            // На главном экране разрешаем закрыть приложение свайпом (history: true)
            // На всех остальных — запрещаем и используем для навигации внутри (history: false)
            const isMainScreen = (screenId === "categoriesScreen");
            window.vkBridge.send("VKWebAppSetSwipeSettings", { history: isMainScreen })
                .catch(e => console.error("Ошибка настройки свайпа:", e));
        }
    }

    // ---------- 3. ОТРИСОВКА КАТЕГОРИЙ ----------
    function renderCategories() {
        const container = document.getElementById("categoriesContainer");
        container.innerHTML = "";
        categories.forEach(cat => {
            const card = document.createElement("div");
            card.className = "category-card";
            card.onclick = () => openCategory(cat.id, cat.name);
            card.innerHTML = `
                <div class="cover-bg" style="background-image: url('${cat.cover}');"></div>
                <h3>${cat.name}</h3>
            `;
            container.appendChild(card);
        });
    }

    // ---------- 4. ОТРИСОВКА ТОВАРОВ В КАТЕГОРИИ ----------
    function openCategory(catId, catName) {
        currentCategoryId = catId;
        document.getElementById("categoryTitle").innerText = catName;
        const itemsList = items[catId] || [];
        const itemsContainer = document.getElementById("itemsContainer");
        itemsContainer.innerHTML = "";
        if (itemsList.length === 0) {
            itemsContainer.innerHTML = "<div style='padding: 20px; text-align:center;'>Товаров пока нет</div>";
        } else {
            itemsList.forEach(item => {
                const card = document.createElement("div");
                card.className = "item-card";
                card.onclick = () => openDetail(catId, item.id);
                card.innerHTML = `
                    <div class="cover-bg" style="background-image: url('${item.img}');"></div>
                    <div class="info">
                        <div class="title">${item.name}</div>
                    </div>
                `;
                itemsContainer.appendChild(card);
            });
        }
        // Добавляем запись в историю браузера
        history.pushState({ screen: "itemsScreen", categoryId: catId, categoryName: catName }, "");
        showScreen("itemsScreen");
    }

    // ---------- 5. ДЕТАЛЬНЫЙ ЭКРАН ТОВАРА ----------
    function openDetail(categoryId, itemId) {
        const foundItem = items[categoryId]?.find(i => i.id === itemId);
        if (!foundItem) return;
        
        const detailDiv = document.getElementById("detailContent");
        detailDiv.innerHTML = `
            <div class="detail-container">
                <img class="detail-img" src="${foundItem.img}" alt="${foundItem.name}">
                <div class="detail-content">
                    <div class="detail-title">${foundItem.name}</div>
                    <div class="detail-desc">${foundItem.description}</div>
                </div>
            </div>
        `;
        // Добавляем запись в историю браузера
        history.pushState({ screen: "detailScreen", categoryId: categoryId, itemId: itemId }, "");
        showScreen("detailScreen");
        lastCategoryId = categoryId;
    }

    // ---------- 6. НАСТРОЙКА КНОПОК "НАЗАД" ----------
    function setupBackButtons() {
        document.getElementById("backToCategoriesBtn").onclick = () => {
            // Возвращаемся на главный экран через историю
            history.back();
        };
        document.getElementById("backToItemsBtn").onclick = () => {
            // Возвращаемся к списку товаров через историю
            history.back();
        };
    }

    // ---------- 7. ОБРАБОТЧИК СИСТЕМНОЙ КНОПКИ/СВАЙПА "НАЗАД" ----------
    function setupPopStateHandler() {
        window.addEventListener("popstate", (event) => {
            // Если есть сохраненное состояние, восстанавливаем экран
            if (event.state) {
                const state = event.state;
                if (state.screen === "itemsScreen") {
                    // Восстанавливаем список товаров
                    currentCategoryId = state.categoryId;
                    openCategory(state.categoryId, state.categoryName);
                } else if (state.screen === "detailScreen") {
                    // Восстанавливаем детальный экран товара
                    openDetail(state.categoryId, state.itemId);
                } else {
                    // Если состояние не распознано, показываем главный экран
                    showScreen("categoriesScreen");
                }
            } else {
                // Если истории нет, показываем главный экран
                showScreen("categoriesScreen");
            }
        });
    }

    // ---------- 8. ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ ----------
    renderCategories();
    setupBackButtons();
    setupPopStateHandler(); // Включаем обработку навигации
    showScreen("categoriesScreen");

    // Добавляем начальное состояние в историю
    history.replaceState({ screen: "categoriesScreen" }, "");

    // ---------- 9. ИНИЦИАЛИЗАЦИЯ VK BRIDGE ----------
    window.addEventListener('load', function() {
        if (window.vkBridge) {
            window.vkBridge.send('VKWebAppInit')
                .then(() => console.log('VK Bridge: инициализация успешна'))
                .catch(e => console.error('Ошибка инициализации VK Bridge:', e));
        } else {
            console.error('VK Bridge не загрузился');
        }
    });
</script>
</body>
</html>
